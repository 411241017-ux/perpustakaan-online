<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Perpustakaan Online</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📚 PerpusApp</h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">🏠 Dashboard</a></li>
            <li><a href="buku.html">📖 Kelola Buku</a></li>
            <li><a href="peminjam.html">👥 Kelola Peminjam</a></li>
            <li><a href="transaksi.html">🔄 Transaksi</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p>Selamat datang di sistem manajemen perpustakaan.</p>
            </div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchBuku" placeholder="Cari buku berdasarkan judul..." onkeyup="searchBooks()">
            </div>
        </header>

        <div class="dashboard-grid" id="katalogBuku">
            <!-- Books will be loaded here via JS -->
        </div>
    </main>

    <script src="js/script.js"></script>
    <script>
        // Custom logic for dashboard
        document.addEventListener('DOMContentLoaded', () => {
            loadKatalogBuku();
        });

        async function loadKatalogBuku(query = '') {
            try {
                let url = '/api/buku';
                if (query) {
                    url += `?query=${encodeURIComponent(query)}`;
                }
                const response = await fetch(url);
                const data = await response.json();
                
                const katalogBuku = document.getElementById('katalogBuku');
                katalogBuku.innerHTML = '';
                
                if (data.length === 0) {
                    katalogBuku.innerHTML = '<p>Buku tidak ditemukan.</p>';
                    return;
                }

                data.forEach(buku => {
                    const statusBadge = buku.status === 'Tersedia' 
                        ? '<span class="badge badge-success">Tersedia</span>'
                        : '<span class="badge badge-warning">Dipinjam</span>';
                    
                    const imageUrl = buku.gambar_sampul ? `/uploads/${buku.gambar_sampul}` : 'https://via.placeholder.com/300x400?text=No+Cover';
                    
                    katalogBuku.innerHTML += `
                        <div class="card" style="display:flex; flex-direction:column;">
                            <img src="${imageUrl}" alt="${buku.judul}" style="width:100%; height:200px; object-fit:cover; border-radius:8px; margin-bottom:16px;">
                            <h3 style="margin-bottom:8px;">${buku.judul}</h3>
                            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:4px;">👤 ${buku.pengarang}</p>
                            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:16px;">🏢 ${buku.penerbit} (${buku.tahun_terbit})</p>
                            <div style="margin-top:auto;">
                                ${statusBadge}
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function searchBooks() {
            const query = document.getElementById('searchBuku').value;
            loadKatalogBuku(query);
        }
    </script>
</body>
</html>
